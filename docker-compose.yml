services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        - RAILS_ENV=development
    command: bash -c "rm -f tmp/pids/server.pid && bin/rails db:prepare && ./bin/rails server -b 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy
      js:
        condition: service_started
      css:
        condition: service_started
    volumes:
      - .:/rails
      - node_modules:/rails/node_modules
      - bundle_cache:/usr/local/bundle
    user: "1000:1000"

  js:
    build:
      context: .
      args:
        - RAILS_ENV=development
    command: bash -c "yarn install && yarn build:watch"
    volumes:
      - .:/rails
      - node_modules:/rails/node_modules
    user: "1000:1000"
    depends_on:
      db:
        condition: service_healthy

  css:
    build:
      context: .
      args:
        - RAILS_ENV=development
    command: bash -c "yarn install && yarn build:css:watch & tail -f /dev/null"
    volumes:
      - .:/rails
      - node_modules:/rails/node_modules
    user: "1000:1000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_cache:
  node_modules: